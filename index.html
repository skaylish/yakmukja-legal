<html lang="ko">

  <title>약먹자 · 약관 및 정책</title>

  <style>

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Malgun Gothic", sans-serif;
      background: #F2F4F6;
      color: #191F28;
      line-height: 1.6;

      display: flex;

    .wrap { width: 100%; max-width: 480px; }
    .logo {

    .sub { text-align: center; color: #8B95A1; font-size: 15px; margin-top: 6px; margin-bottom: 28px; }
    .card {
      display: flex; align-items: center; gap: 14px;
      background: #fff; border-radius: 16px;
      padding: 20px; margin-bottom: 12px;
      text-decoration: none; color: inherit;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
      transition: transform .12s ease;
    }
    .card:active { transform: scale(0.98); }
    .card .ic { font-size: 28px; width: 40px; text-align: center; }
    .card .tt { font-size: 17px; font-weight: 700; }
    .card .dd { font-size: 13px; color: #8B95A1; margin-top: 2px; }
    .card .arrow { margin-left: auto; color: #C0C6CC; font-size: 22px; }
    footer { text-align: center; color: #ADB5BD; font-size: 12px; margin-top: 28px; line-height: 1.7; }

</head>

  <div class="wrap">
